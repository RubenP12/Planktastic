<script src="js/common.js?v=1"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var itemId = params.get('id');
  var items  = window.__boNewsItems || [];
  var item   = items.find(function (n) { return n.id === itemId; });

  function _esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function _paragraphs(text) {
    if (!text) return '';
    return text.split(/\n\s*\n/).map(function (p) {
      return '<p>' + _esc(p.trim()).replace(/\n/g, '<br>') + '</p>';
    }).filter(function (p) { return p !== '<p></p>'; }).join('');
  }

  function render(lang) {
    var container = document.getElementById('article-container');
    if (!container) return;

    if (!item) {
      container.innerHTML =
        '<div class="art-not-found">' +
          '<h2>' + (lang === 'pt' ? 'Artigo não encontrado' : 'Article not found') + '</h2>' +
          '<p><a href="news.html">' + (lang === 'pt' ? '← Voltar às Notícias' : '← Back to News') + '</a></p>' +
        '</div>';
      return;
    }

    var usePt   = lang === 'pt';
    var tag     = (usePt && item.tag_pt)      ? item.tag_pt      : (item.tag   || '');
    var title   = (usePt && item.title_pt)    ? item.title_pt    : (item.title || '');
    var summary = (usePt && item.body_pt)     ? item.body_pt     : (item.body  || '');
    var content = (usePt && item.content_pt)  ? item.content_pt  : (item.content_en || '');

    var imgStyle = item.img
      ? 'background-image:url(' + item.img + ');background-size:cover;background-position:center'
      : '';

    var html =
      '<div class="art-hero" style="' + imgStyle + '">' + (item.img ? '' : '<span>🗞️</span>') + '</div>' +
      (tag    ? '<div class="art-tag">' + _esc(tag) + '</div>' : '') +
      (title  ? '<h1 class="art-title">' + _esc(title) + '</h1>' : '') +
      (summary ? '<div class="art-summary">' + _esc(summary) + '</div>' : '') +
      (content ? '<div class="art-body">' + _paragraphs(content) + '</div>' : '');

    container.innerHTML = html;
    document.title = 'Planktastic — ' + (title || 'News');
  }

  // Initial render
  render(localStorage.getItem('planktastic_lang') || 'en');

  // Hook into setLang so article re-renders on language switch
  var _origSetLang = window.setLang;
  window.setLang = function (lang) {
    _origSetLang(lang);
    render(lang);
  };
})();
</script>
